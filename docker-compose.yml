services:
  scheduler:
    build: .
    image: sub2api-account-scheduler:local
    container_name: sub2api-account-scheduler
    restart: unless-stopped
    init: true
    env_file:
      - .env
    environment:
      SCHEDULER_ADMIN_SECRET: ${SCHEDULER_ADMIN_SECRET:?set SCHEDULER_ADMIN_SECRET in .env}
    ports:
      - "127.0.0.1:8323:8323"
    volumes:
      - ./data:/data
    networks:
      - sub2api-network
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 128
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    deploy:
      resources:
        limits:
          memory: 192M
          cpus: "0.50"
    stop_grace_period: 15s

networks:
  sub2api-network:
    external: true
    name: ${SUB2API_DOCKER_NETWORK:-sub2api_sub2api-network}
